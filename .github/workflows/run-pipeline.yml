name: Run pipeline

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: python -m unittest discover tests

      - name: Download raw data
        run: python scripts/download_raw_data.py

      - name: Run data pipeline
        run: python scripts/run_pipeline.py

      - name: Build clean modeling dataset
        run: python scripts/build_model_dataset.py

      - name: Commit data outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/raw data/processed
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update pipeline data outputs"
            git push
          fi

      - name: Upload raw data
        uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: data/raw/
          if-no-files-found: error

      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/
          if-no-files-found: error
